name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: 24.14.0
  VERCEL_CLI_VERSION: 54.1.0
  NEXT_TELEMETRY_DISABLED: 1

defaults:
  run:
    shell: bash

jobs:
  require-main:
    name: Require main branch
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ref guard
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Deploy Production can only run from refs/heads/main."
            exit 1
          fi

  deploy-production:
    name: Deploy Production
    needs: require-main
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: ${{ steps.vercel_production.outputs.deploymentUrl }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Variables for Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: pnpm dlx vercel@${VERCEL_CLI_VERSION} pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel Output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm dlx vercel@${VERCEL_CLI_VERSION} build --prod --token="$VERCEL_TOKEN"

      - name: Apply GitHub Sync Cutover Migrations
        id: github_sync_migrations
        env:
          SCHEMA_DEPLOY_TARGET: production
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: pnpm run deploy:github-sync-migrations

      - name: Deploy Supabase Schema to Production
        env:
          SCHEMA_DEPLOY_TARGET: production
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: pnpm run deploy:supabase-schema

      - name: Verify Production Supabase Schema
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm run verify:supabase

      - name: Verify Production Auth Mapping
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm run verify:auth

      - name: Verify Production GitHub Sync Contract
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm run verify:github-sync

      - name: Verify Planning Hierarchy Contract
        run: pnpm run verify:hierarchy

      - name: Deploy Prebuilt Output to Vercel Production
        id: vercel_production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REQUIRE_SUPABASE_AUTH: ${{ secrets.REQUIRE_SUPABASE_AUTH }}
          APP_URL: ${{ secrets.APP_URL }}
          GITHUB_SYNC_OWNER: findmydoc-platform
          GITHUB_SYNC_REPO: management
          GOOGLE_CHAT_DELIVERY_ENABLED: ${{ secrets.GOOGLE_CHAT_DELIVERY_ENABLED }}
        run: bash ./.github/scripts/deploy/vercel-deploy-prebuilt.sh production

      - name: Restore Previous GitHub Sync Fields After Failed Cutover
        if: failure() && steps.github_sync_migrations.outputs.schema_renamed == 'true' && steps.vercel_production.outcome != 'success'
        env:
          SCHEMA_DEPLOY_TARGET: production
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: pnpm run rollback:github-sync-fields

      - name: Reconcile Existing GitHub Comments
        if: steps.vercel_production.outcome == 'success'
        env:
          APP_URL: ${{ secrets.APP_URL }}
          FOUNDEROPS_DELIVERY_SECRET: ${{ secrets.FOUNDEROPS_DELIVERY_SECRET }}
        run: |
          preview=$(curl --fail --show-error --silent \
            --retry 3 --retry-all-errors --retry-delay 5 \
            --header "x-founderops-delivery-secret: ${FOUNDEROPS_DELIVERY_SECRET}" \
            "${APP_URL%/}/api/github-comments/reconcile")
          printf 'Read-only comment reconciliation: %s\n' "$preview"
          delivery=$(curl --fail --show-error --silent \
            --retry 3 --retry-all-errors --retry-delay 5 \
            --request POST \
            --header "x-founderops-delivery-secret: ${FOUNDEROPS_DELIVERY_SECRET}" \
            "${APP_URL%/}/api/github-comments/reconcile")
          printf 'Comment delivery result: %s\n' "$delivery"

      - name: Generate deployment summary
        if: always()
        env:
          DEPLOYMENT_OUTCOME: ${{ steps.vercel_production.outcome }}
          DEPLOYMENT_URL: ${{ steps.vercel_production.outputs.deploymentUrl }}
        run: |
          {
            echo "## Production Deployment Summary"
            if [[ "$DEPLOYMENT_OUTCOME" == "success" ]]; then
              echo "- **Status**: Success"
              echo "- **URL**: ${DEPLOYMENT_URL}"
            else
              echo "- **Status**: Failed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
