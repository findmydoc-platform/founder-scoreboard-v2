name: Deploy Preview

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.14.0
  VERCEL_CLI_VERSION: 54.1.0
  EXPECTED_VERCEL_PROJECT_ID: prj_siACjDyULbkdJRqGgKlGSfkU8iMP
  NEXT_TELEMETRY_DISABLED: 1

defaults:
  run:
    shell: bash

jobs:
  deploy-preview:
    name: Deploy Preview
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: preview
      url: ${{ steps.vercel_preview.outputs.deploymentUrl }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate preview secrets
        id: preview_guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          ready=true
          reason=""

          if [[ -z "$VERCEL_TOKEN" ]]; then
            ready=false
            reason="VERCEL_TOKEN missing"
          elif [[ -z "$VERCEL_ORG_ID" ]]; then
            ready=false
            reason="VERCEL_ORG_ID missing"
          elif [[ -z "$VERCEL_PROJECT_ID" ]]; then
            ready=false
            reason="VERCEL_PROJECT_ID missing"
          fi

          echo "ready=$ready" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        if: steps.preview_guard.outputs.ready == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        if: steps.preview_guard.outputs.ready == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        if: steps.preview_guard.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Variables for Preview
        if: steps.preview_guard.outputs.ready == 'true'
        env:
          EXPECTED_VERCEL_PROJECT_ID: ${{ env.EXPECTED_VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          bash ./.github/scripts/deploy/assert-vercel-project-binding.sh
          pnpm dlx vercel@${VERCEL_CLI_VERSION} pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel Output
        if: steps.preview_guard.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: pnpm dlx vercel@${VERCEL_CLI_VERSION} build --target=preview --token="$VERCEL_TOKEN"

      - name: Deploy Prebuilt Output to Vercel Preview
        if: steps.preview_guard.outputs.ready == 'true'
        id: vercel_preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: bash ./.github/scripts/deploy/vercel-deploy-prebuilt.sh preview

      - name: Generate deployment summary
        if: always()
        env:
          PREVIEW_READY: ${{ steps.preview_guard.outputs.ready }}
          PREVIEW_REASON: ${{ steps.preview_guard.outputs.reason }}
          DEPLOYMENT_OUTCOME: ${{ steps.vercel_preview.outcome }}
          DEPLOYMENT_URL: ${{ steps.vercel_preview.outputs.deploymentUrl }}
        run: |
          {
            echo "## Preview Deployment Summary"
            if [[ "$PREVIEW_READY" != "true" ]]; then
              echo "- **Status**: Skipped"
              echo "- **Reason**: preview secrets are missing"
              if [[ -n "$PREVIEW_REASON" ]]; then
                echo "- **Details**: ${PREVIEW_REASON}"
              fi
            elif [[ "$DEPLOYMENT_OUTCOME" == "success" ]]; then
              echo "- **Status**: Success"
              echo "- **URL**: ${DEPLOYMENT_URL}"
            elif [[ "$DEPLOYMENT_OUTCOME" == "skipped" ]]; then
              echo "- **Status**: Skipped"
              echo "- **Reason**: preview secrets are missing"
            else
              echo "- **Status**: Failed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
