name: Dependabot Auto Merge

on:
  workflow_run:
    workflows:
      - Dependency Validation
      - Deploy Preview
    types:
      - completed

permissions:
  actions: read
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  auto-merge:
    name: Auto Merge Dependabot PRs
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.repository.full_name == 'findmydoc-platform/founder-scoreboard-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 24.14.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0

      - name: Run Dependabot auto merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_COUNT: ${{ toJson(github.event.workflow_run.pull_requests) }}
          REPO: ${{ github.repository }}
        run: node scripts/dependabot-auto-merge.mjs
