name: Backfill FounderOps GitHub Project

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Observe only or apply one bounded batch
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - apply
      batch_size:
        description: Maximum items to change in apply mode (1-50)
        required: true
        default: "20"
        type: string
      after_task_id:
        description: Resume after this FounderOps task ID
        required: false
        type: string
      repository:
        description: Restrict the run to one repository
        required: true
        default: all
        type: choice
        options:
          - all
          - findmydoc-platform/management
          - findmydoc-platform/website
          - findmydoc-platform/clinic-dashboard
      include_not_synced:
        description: Include linked tasks whose FounderOps sync state is not synced
        required: true
        default: false
        type: boolean
      expected_owner:
        description: Fail unless this is the configured Project owner
        required: true
        default: findmydoc-platform
        type: string
      expected_project_number:
        description: Fail unless this is the configured Project number
        required: true
        default: "21"
        type: string

permissions:
  contents: read

concurrency:
  group: founderops-github-project-backfill-production
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  backfill:
    name: ${{ inputs.mode == 'apply' && 'Apply bounded backfill batch' || 'Preview complete backfill' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7

      - name: Require main branch
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::The FounderOps GitHub Project backfill can only run from refs/heads/main."
            exit 1
          fi

      - name: Network and GitHub preflight
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh auth status
          gh api rate_limit --jq '.rate.remaining'

      - name: Run FounderOps GitHub Project backfill
        env:
          APP_URL: ${{ secrets.APP_URL }}
          BACKFILL_AFTER_TASK_ID: ${{ inputs.after_task_id }}
          BACKFILL_BATCH_SIZE: ${{ inputs.batch_size }}
          BACKFILL_EXPECTED_OWNER: ${{ inputs.expected_owner }}
          BACKFILL_EXPECTED_PROJECT_NUMBER: ${{ inputs.expected_project_number }}
          BACKFILL_INCLUDE_NOT_SYNCED: ${{ inputs.include_not_synced }}
          BACKFILL_MODE: ${{ inputs.mode }}
          BACKFILL_REPORT_PATH: ${{ runner.temp }}/github-project-backfill-report.json
          BACKFILL_REPOSITORY: ${{ inputs.repository }}
          FOUNDEROPS_DELIVERY_SECRET: ${{ secrets.FOUNDEROPS_DELIVERY_SECRET }}
          FOUNDEROPS_GITHUB_ACTOR: ${{ github.actor }}
        run: bash ./.github/scripts/maintenance/backfill-founderops-github-project.sh

      - name: Upload backfill report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: github-project-backfill-${{ github.run_id }}
          path: ${{ runner.temp }}/github-project-backfill-report.json
          if-no-files-found: warn
          retention-days: 30
