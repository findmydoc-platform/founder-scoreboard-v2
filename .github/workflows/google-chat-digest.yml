name: Google Chat Digest

on:
  schedule:
    # 09:00 Europe/Berlin during summer time. Adjust to 08:00 UTC for winter if exact local time is required.
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum pending notification events to process"
        required: false
        default: "20"

permissions:
  contents: read

concurrency:
  group: google-chat-digest
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  send-digest:
    name: Send FounderOps Digest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
    steps:
      - name: Generate focus reminders
        env:
          FOUNDEROPS_DELIVERY_SECRET: ${{ secrets.FOUNDEROPS_DELIVERY_SECRET }}
          DIGEST_LIMIT: ${{ github.event.inputs.limit || '20' }}
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          http_code="$(
            curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
              --request POST \
              --header "content-type: application/json" \
              --header "x-founderops-delivery-secret: ${FOUNDEROPS_DELIVERY_SECRET}" \
              --data "{\"limit\":${DIGEST_LIMIT}}" \
              "https://founder-ops.findmydoc.eu/api/notifications/generate-digest"
          )"

          {
            echo "## FounderOps Fokus-Reminder"
            echo "- HTTP status: ${http_code}"
            echo "- Limit: ${DIGEST_LIMIT}"
            echo "- Target: https://founder-ops.findmydoc.eu/api/notifications/generate-digest"
            echo
            echo '```json'
            cat "$response_file"
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
            cat "$response_file"
            exit 1
          fi

      - name: Trigger digest delivery
        env:
          FOUNDEROPS_DELIVERY_SECRET: ${{ secrets.FOUNDEROPS_DELIVERY_SECRET }}
          DIGEST_LIMIT: ${{ github.event.inputs.limit || '20' }}
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          http_code="$(
            curl --silent --show-error --output "$response_file" --write-out "%{http_code}" \
              --request POST \
              --header "content-type: application/json" \
              --header "x-founderops-delivery-secret: ${FOUNDEROPS_DELIVERY_SECRET}" \
              --data "{\"limit\":${DIGEST_LIMIT}}" \
              "https://founder-ops.findmydoc.eu/api/notifications/deliver"
          )"

          {
            echo "## FounderOps Google Chat Digest"
            echo "- HTTP status: ${http_code}"
            echo "- Limit: ${DIGEST_LIMIT}"
            echo "- Target: https://founder-ops.findmydoc.eu/api/notifications/deliver"
            echo
            echo '```json'
            cat "$response_file"
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
            cat "$response_file"
            exit 1
          fi
