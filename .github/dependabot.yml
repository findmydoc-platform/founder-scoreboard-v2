version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      nextjs-stack:
        patterns:
          - next
          - eslint-config-next
      react-stack:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      tooling:
        patterns:
          - eslint
          - typescript
          - tailwindcss
          - "@tailwindcss/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
