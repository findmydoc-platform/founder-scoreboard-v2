version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      nextjs-stack-minor-patch:
        patterns:
          - next
          - eslint-config-next
        update-types:
          - minor
          - patch
      nextjs-stack-major:
        patterns:
          - next
          - eslint-config-next
        update-types:
          - major
      react-stack-minor-patch:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - minor
          - patch
      react-stack-major:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - major
      tooling-minor-patch:
        patterns:
          - eslint
          - typescript
          - tailwindcss
          - "@tailwindcss/*"
        update-types:
          - minor
          - patch
      tooling-major:
        patterns:
          - eslint
          - typescript
          - tailwindcss
          - "@tailwindcss/*"
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
