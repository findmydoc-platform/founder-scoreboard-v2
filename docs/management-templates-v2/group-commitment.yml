name: Group Commitment
description: Themenblock innerhalb eines Epic / Meilensteins
title: "[Group Commitment]: "
labels: ["type:group-commitment"]
body:
  - type: markdown
    attributes:
      value: |
        Ein Group Commitment bündelt mehrere Deliverables innerhalb eines Epic / Meilensteins.
        Es ist nicht direkt score-relevant.

  - type: input
    id: epic
    attributes:
      label: Epic / Meilenstein
      description: Zu welchem Epic gehört dieses Group Commitment?
      placeholder: "z. B. Investor Ready"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Ziel
      description: Warum gibt es diesen Themenblock?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priorität
      options:
        - "P0"
        - "P1"
        - "P2"
        - "P3"
        - "P4"
    validations:
      required: true
