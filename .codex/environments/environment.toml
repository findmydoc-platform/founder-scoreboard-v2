version = 1
name = "founder-scoreboard"

[setup]
script = "rtk bash scripts/codex-bootstrap.sh"

[[actions]]
name = "Initialize local database"
icon = "run"
command = "rtk bash scripts/codex-pnpm.sh run local:reset"

[[actions]]
name = "Run locally"
icon = "run"
command = "rtk bash scripts/codex-pnpm.sh run local:start && rtk bash scripts/codex-pnpm.sh run dev:local"

[[actions]]
name = "Test"
icon = "test"
command = "rtk bash scripts/codex-pnpm.sh test"

[[actions]]
name = "Lint"
icon = "test"
command = "rtk bash scripts/codex-pnpm.sh run lint"

[[actions]]
name = "Build"
icon = "test"
command = "rtk bash scripts/codex-pnpm.sh run build"

[[actions]]
name = "Stop local database"
icon = "tool"
command = "rtk bash scripts/codex-pnpm.sh run local:stop"
